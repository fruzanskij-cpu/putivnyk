<!DOCTYPE HTML>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Путівник по Львову</title>

    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body class="is-preload">

<div id="page-wrapper">

    <!-- Header -->
    <header id="header">
        <h1>
            <a href="index.html">Путівник по Львову</a>
        </h1>

        <nav id="nav">
            <ul>
                <li><a href="index.html">Головна</a></li>
                <li><a href="places.html">Цікаві місця</a></li>
                <li><a href="food.html">Заклади</a></li>
                <li><a href="contact.html" class="button">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main -->
    <section id="main" class="container medium">

        <header>
            <h2>Зв’язок зі мною</h2>
            <p>
                Якщо маєте питання або пропозиції щодо путівника —
                напишіть мені через форму нижче.
            </p>
        </header>

        <div class="box">

            <form method="post" action="#">

                <div class="row gtr-50 gtr-uniform">

                    <div class="col-6 col-12-mobilep">
                        <input
                            type="text"
                            name="name"
                            id="name"
                            placeholder="Ваше ім’я"
                        />
                    </div>

                    <div class="col-6 col-12-mobilep">
                        <input
                            type="email"
                            name="email"
                            id="email"
                            placeholder="Ваш Email"
                        />
                    </div>

                    <div class="col-12">
                        <input
                            type="text"
                            name="subject"
                            id="subject"
                            placeholder="Тема повідомлення"
                        />
                    </div>

                    <div class="col-12">
                        <textarea
                            name="message"
                            id="message"
                            rows="6"
                            placeholder="Напишіть ваше повідомлення..."
                        ></textarea>
                    </div>

                    <div class="col-12">
                        <ul class="actions special">
                            <li>
                                <input type="submit" value="Надіслати повідомлення" />
                            </li>
                        </ul>
                    </div>

                </div>

            </form>

        </div>

    </section>

    <!-- Footer -->
    <footer id="footer">

        <ul class="icons">
            <li>
                <a href="#" class="icon brands fa-instagram">
                    <span class="label">Instagram</span>
                </a>
            </li>

            <li>
                <a href="#" class="icon brands fa-facebook-f">
                    <span class="label">Facebook</span>
                </a>
            </li>

            <li>
                <a href="#" class="icon brands fa-github">
                    <span class="label">Github</span>
                </a>
            </li>
        </ul>

        <ul class="copyright">
            <li>© 2026 Путівник по Львову</li>
            <li>Створено Феліксом</li>
        </ul>

    </footer>

</div>


</body>
</html>
